name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (CPU)
        run: |
          uv venv
          # Install CPU builds for torch/torchvision
          uv pip install --python .venv/bin/python --index-url https://download.pytorch.org/whl/cpu torch==2.8.0 torchvision==0.23.0
          uv pip install --python .venv/bin/python -r requirements.txt
          uv pip install --python .venv/bin/python -e .

      - name: Run tests
        run: |
          uv run --python .venv/bin/python pytest -q
